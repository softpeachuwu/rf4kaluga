<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF4 Kaluga — Gear Builds</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c25;
    --surface2: #1e2330;
    --border: #2a3044;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #e8eaf0;
    --muted: #7a8299;
    --tag-bg: #1e2330;
    --spinning: #38bdf8;
    --bottom: #fb923c;
    --float: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: color 0.15s;
  }
  .nav-links a.active { color: var(--accent); }
  .nav-links a.soon { opacity: 0.35; cursor: default; pointer-events: none; }
  .nav-links a:hover:not(.soon) { color: var(--text); }

  /* HERO STRIP */
  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
  }
  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 14px; color: var(--muted); max-width: 520px; line-height: 1.6; }

  /* LAYOUT */
  .container { display: grid; grid-template-columns: 260px 1fr 300px; gap: 0; min-height: calc(100vh - 120px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 2px; }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); }
  .filter-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-all { background: var(--accent); }
  .dot-spinning { background: var(--spinning); }
  .dot-bottom { background: var(--bottom); }
  .dot-float { background: var(--float); }
  .filter-btn .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .sub-filters { margin-left: 18px; margin-top: 2px; }

  /* SEARCH */
  .search-wrap { padding: 1rem 1rem 0; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* BUILDS LIST */
  .builds-area { padding: 1rem; overflow-y: auto; }
  .builds-grid { display: flex; flex-direction: column; gap: 8px; }
  .build-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .build-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .build-card.type-spinning::before { background: var(--spinning); }
  .build-card.type-bottom::before { background: var(--bottom); }
  .build-card.type-float::before { background: var(--float); }
  .build-card:hover { border-color: #3a4060; background: var(--surface2); }
  .build-card.selected { border-color: var(--accent); background: var(--surface2); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .card-level {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .card-gear { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .card-gear strong { color: #a0aabe; font-weight: 500; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.copper { border-color: #b45309; color: #f59e0b; background: #1c1508; }
  .tag.budget { border-color: #166534; color: #4ade80; background: #071510; }

  /* DETAIL PANEL */
  .detail-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 1.5rem;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    gap: 8px;
  }
  .detail-empty .icon { font-size: 32px; opacity: 0.3; margin-bottom: 4px; }
  .detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }
  .detail-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }
  .detail-section { margin-bottom: 1.25rem; }
  .detail-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid #1e2330;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); }
  .stat-val { font-weight: 500; color: var(--text); }
  .detail-desc {
    font-size: 13px;
    color: #9aa3b8;
    line-height: 1.7;
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  .detail-fish { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .fish-tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .cost-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
  .cost-pill {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 8px;
    background: #071510;
    border: 1px solid #166534;
    color: var(--accent);
  }
  .copper-pill {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 8px;
    background: #1c1508;
    border: 1px solid #b45309;
    color: #f59e0b;
  }
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 14px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .detail-panel { position: static; height: auto; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">RF4<span>KALUGA</span></div>
  <div class="nav-links">
    <a href="#" class="active">Builds</a>
    <a href="#" class="soon">Maps</a>
    <a href="#" class="soon">Gear DB</a>
    <a href="#" class="soon">Knowledge</a>

  </div>
</nav>

<div class="hero">

</div>

<div class="container">

  <!-- SIDEBAR -->

      <input type="text" id="searchInput" placeholder="Search builds..." oninput="filterBuilds()" />
    </div>

        </button>
        <div class="sub-filters filter-group" id="sub-bottom" style="display:none;">
          <button class="filter-btn" style="font-size:13px;" onclick="setFilter('bottom-feeder', this)"><span style="width:8px;height:8px;"></span> Feeder / Picker</button>
          <button class="filter-btn" style="font-size:13px;" onclick="setFilter('bottom-carp', this)"><span style="width:8px;height:8px;"></span> Carp</button>
          <button class="filter-btn" style="font-size:13px;" onclick="setFilter('bottom-copper', this)"><span style="width:8px;height:8px;"></span> ⚡ Copper Legal</button>

      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Player Level</div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setLevelFilter('all-levels', this)"><span class="dot" style="background:var(--muted)"></span> All Levels</button>
        <button class="filter-btn" onclick="setLevelFilter('beginner', this)"><span class="dot" style="background:#4ade80"></span> Beginner (1–19)</button>
        <button class="filter-btn" onclick="setLevelFilter('intermediate', this)"><span class="dot" style="background:#38bdf8"></span> Intermediate (20–39)</button>
        <button class="filter-btn" onclick="setLevelFilter('advanced', this)"><span class="dot" style="background:#f59e0b"></span> Advanced (40+)</button>
      </div>
    </div>
  </aside>

  <!-- BUILDS LIST -->
  <main class="builds-area">
    <div class="builds-grid" id="buildsGrid"></div>
  </main>

  <!-- DETAIL PANEL -->
  <aside class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="icon">🎣</div>
      <div>Select a build to see full details</div>
    </div>
  </aside>

</div>

// ============================================================
// APP LOGIC — no need to edit below this line
// ============================================================
let activeFilter = 'all';
let activeLevelFilter = 'all-levels';
let selectedId = null;

function updateCounts() {
  document.getElementById('count-all').textContent = builds.length;
  document.getElementById('count-spinning').textContent = builds.filter(b => b.type === 'spinning').length;
  document.getElementById('count-bottom').textContent = builds.filter(b => b.type === 'bottom').length;
  document.getElementById('count-float').textContent = builds.filter(b => b.type === 'float').length;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['spinning','bottom','float'].forEach(t => {
    const sub = document.getElementById('sub-' + t);
    if (sub) sub.style.display = (filter === t || filter.startsWith(t + '-')) ? 'flex' : 'none';
  });
  renderBuilds();
}

function setLevelFilter(level, btn) {
  activeLevelFilter = level;
  document.querySelectorAll('.sidebar-section:last-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBuilds();
}

function filterBuilds() { renderBuilds(); }

function getFilteredBuilds() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  return builds.filter(b => {
    const typeMatch = activeFilter === 'all' ||
      b.type === activeFilter ||
      b.subtype === activeFilter ||
      (activeFilter === 'bottom-copper' && b.copperLegal && b.type === 'bottom');
    const levelMatch = activeLevelFilter === 'all-levels' ||
      (activeLevelFilter === 'beginner' && b.minLevel < 20) ||
      (activeLevelFilter === 'intermediate' && b.minLevel >= 20 && b.minLevel < 40) ||
      (activeLevelFilter === 'advanced' && b.minLevel >= 40);
    const searchMatch = !search ||
      b.name.toLowerCase().includes(search) ||
      b.rod.name.toLowerCase().includes(search) ||
      b.reel.name.toLowerCase().includes(search) ||
      b.fish.some(f => f.toLowerCase().includes(search)) ||
      b.tags.some(t => t.toLowerCase().includes(search));
    return typeMatch && levelMatch && searchMatch;
  });
}

function renderBuilds() {
  const grid = document.getElementById('buildsGrid');
  const filtered = getFilteredBuilds();
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No builds found for this filter.<br>More builds coming soon.</div>';
    return;
  }
  grid.innerHTML = filtered.map(b => `
    <div class="build-card type-${b.type} ${selectedId === b.id ? 'selected' : ''}" onclick="selectBuild(${b.id})">
      <div class="card-top">
        <div class="card-name">${b.name}</div>
        <div class="card-level">${b.levelLabel}</div>
      </div>
      <div class="card-gear">
        <strong>Rod:</strong> ${b.rod.name} &nbsp;·&nbsp; <strong>Reel:</strong> ${b.reel.name}
      </div>
      <div class="card-tags">
        ${b.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        ${b.copperLegal ? '<span class="tag copper">⚡ Copper Legal</span>' : ''}
        ${b.budget ? '<span class="tag budget">Budget</span>' : ''}
      </div>
    </div>
  `).join('');
}

function selectBuild(id) {
  selectedId = id;
  const b = builds.find(x => x.id === id);
  renderBuilds();
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
  ${b.rodImage || b.reelImage ? `
    <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1.25rem; justify-content:center;">
      ${b.rodImage ? `<img src="${b.rodImage}" style="height:100px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));">` : ''}
      ${b.reelImage ? `<img src="${b.reelImage}" style="height:100px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));">` : ''}
    </div>` : ''}
    <div class="detail-name">${b.name}</div>
    <div class="detail-sub">Min level ${b.minLevel} &nbsp;·&nbsp; ${b.type.charAt(0).toUpperCase() + b.type.slice(1)} fishing</div>

    <div class="detail-desc">${b.description}</div>

    <div class="detail-section">
      <div class="detail-section-title">Rod</div>
      <div class="stat-row"><span class="stat-label">Name</span><span class="stat-val">${b.rod.name}</span></div>
      <div class="stat-row"><span class="stat-label">Test weight</span><span class="stat-val">${b.rod.testMin}–${b.rod.testMax}g</span></div>
      <div class="stat-row"><span class="stat-label">Length</span><span class="stat-val">${b.rod.length}</span></div>
      <div class="stat-row"><span class="stat-label">Action</span><span class="stat-val">${b.rod.action}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Reel</div>
      <div class="stat-row"><span class="stat-label">Name</span><span class="stat-val">${b.reel.name}</span></div>
      <div class="stat-row"><span class="stat-label">Gear ratio</span><span class="stat-val">${b.reel.ratio}</span></div>
      <div class="stat-row"><span class="stat-label">Friction</span><span class="stat-val">${b.reel.friction}</span></div>
      <div class="stat-row"><span class="stat-label">Reel size</span><span class="stat-val">${b.reel.size}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Line</div>
      <div class="stat-row"><span class="stat-label">Name</span><span class="stat-val">${b.line.name}</span></div>
      <div class="stat-row"><span class="stat-label">Diameter</span><span class="stat-val">${b.line.diameter}</span></div>
      <div class="stat-row"><span class="stat-label">Breaking load</span><span class="stat-val">${b.line.breakingLoad}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Target fish</div>
      <div class="detail-fish">
        ${b.fish.map(f => `<span class="fish-tag">${f}</span>`).join('')}
      </div>
    </div>

    <div class="cost-row">
      <span class="cost-pill">~${b.cost.toLocaleString()} silver</span>
      ${b.copperLegal ? '<span class="copper-pill">⚡ Copper Legal</span>' : ''}
    </div>
  `;
}

updateCounts();
renderBuilds();
</script>
</body>
</html>
