<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF4Kaluga — Gear Builds</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12100e; --surface: #1c1814; --surface2: #24201a; --border: #3a3228;
    --accent: #c9a96e; --accent2: #b8924f; --text: #ede8df; --muted: #8a7d6a;
    --tag-bg: #24201a; --spinning: #7eb8c9; --bottom: #c97a4a; --float: #9d8fc4; --sea: #0891b2;
    --green: #4ade80; --red: #f87171; --blue: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 50px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.05em; color: var(--text); display: flex; flex-direction: column; align-items: flex-start; gap: 0; line-height: 1; position: relative; padding-top: 12px; }
  .logo-wordmark { font-size: 20px; line-height: 1; color: var(--text); margin-bottom: -2px; }
  .logo-accent { color: var(--accent); }
  .logo-fish { height: 36px; width: auto; filter: brightness(0) saturate(100%) invert(72%) sepia(38%) saturate(500%) hue-rotate(10deg) brightness(95%); opacity: 0.88; margin-top: -4px; display: block; }
  .nav-right { display: flex; align-items: center; gap: 2rem; }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a { font-size: 14px; font-weight: 500; color: var(--muted); text-decoration: none; letter-spacing: 0.03em; transition: color 0.15s; cursor: pointer; }
  .nav-links a.active { color: var(--accent); }
  .nav-links a.soon { opacity: 0.35; cursor: default; pointer-events: none; }
  .nav-links a:hover:not(.soon):not(.active) { color: var(--text); }
  .lang-switcher { display: flex; align-items: center; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .lang-btn { font-size: 18px; padding: 2px 5px; border-radius: 5px; border: none; background: transparent; cursor: pointer; transition: all 0.15s; opacity: 0.5; line-height: 1; }
  .lang-btn:hover { opacity: 0.85; }
  .lang-btn.active { background: var(--border); opacity: 1; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero { padding: 8px 1.5rem 6px; border-bottom: 1px solid var(--border); }
  .hero h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.5; }
  .hero h1 span { color: var(--accent); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 80px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 1rem; position: sticky; top: 50px; height: calc(100vh - 50px); overflow-y: auto; }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; padding-left: 4px; }
  .filter-group { display: flex; flex-direction: column; gap: 2px; }
  .filter-btn { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: left; width: 100%; }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); }
  .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-all { background: var(--accent); } .dot-spinning { background: var(--spinning); } .dot-bottom { background: var(--bottom); } .dot-float { background: var(--float); }
  .filter-btn .count { margin-left: auto; font-size: 11px; color: var(--muted); background: var(--bg); padding: 1px 6px; border-radius: 10px; }
  .sub-filters { margin-left: 18px; margin-top: 2px; }
  .search-wrap { margin-bottom: 1.25rem; }
  .search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .main-area { padding: 1rem; overflow-y: auto; }

  /* BUILD CARDS */
  .builds-grid { display: flex; flex-direction: column; gap: 8px; }
  .build-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .build-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .build-card.type-spinning::before { background: var(--spinning); }
  .build-card.type-bottom::before { background: var(--bottom); }
  .build-card.type-float::before { background: var(--float); }
  .build-card.type-sea::before { background: var(--sea); }
  .dot-sea { background: var(--sea); }
  .build-card:hover { border-color: #3a4060; background: var(--surface2); }
  .build-card.selected { border-color: var(--accent); background: var(--surface2); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .card-level { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--muted); white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
  .card-gear { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .card-gear strong { color: #a0aabe; font-weight: 500; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted); }
  .tag.copper-yes { border-color: #166534; color: #4ade80; background: #0a1f10; }
  .tag.copper-no  { border-color: #7f1d1d; color: #f87171; background: #1a0a0a; }
  .tag.budget { border-color: #8a6830; color: #c9a96e; background: #1c1608; }
  .tag.cost { border-color: #166534; color: #4ade80; background: #0a1f10; margin-left: auto; }
  .no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); border-color: var(--accent); }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 6px; padding-right: 2.5rem; }
  .modal-sub { font-size: 13px; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .modal-badge { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .gear-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
  .gear-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; }
  .gear-card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .gear-card-img { width: 100%; height: 198px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); overflow: hidden; }
  .gear-card-img img { width: 92%; height: 180px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }
  .gear-card-img .no-img { font-size: 36px; opacity: 0.12; }
  .gear-card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
  .gear-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--bg); }
  .gear-stat:last-of-type { border-bottom: none; }
  .gear-stat-label { color: var(--muted); } .gear-stat-val { font-weight: 500; color: var(--text); }
  .gear-card-cost { margin-top: auto; padding-top: 10px; font-size: 13px; font-weight: 600; color: var(--accent); }
  .line-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
  .line-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; }
  .line-card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .line-card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.6rem; }
  .line-card.no-leader { opacity: 0.35; }
  .line-card.no-leader .line-card-name { color: var(--muted); font-style: italic; font-weight: 400; }
  .modal-section { margin-bottom: 1.25rem; }
  .modal-section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .modal-desc { font-size: 14px; color: #9aa3b8; line-height: 1.75; background: var(--surface2); border-radius: 8px; padding: 14px 16px; border: 1px solid var(--border); }
  .modal-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #1e2330; }
  .modal-stat:last-child { border-bottom: none; }
  .modal-stat-label { color: var(--muted); } .modal-stat-val { font-weight: 500; color: var(--text); }
  .fish-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .fish-tag { font-size: 12px; padding: 3px 10px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .modal-footer { display: flex; align-items: center; gap: 10px; padding-top: 1rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .total-cost { font-size: 15px; font-weight: 700; padding: 7px 18px; border-radius: 10px; background: #1c1608; border: 1px solid #8a6830; color: var(--accent); }
  .copper-badge-yes { font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 10px; background: #0a1f10; border: 1px solid #166534; color: #4ade80; }
  .copper-badge-no  { font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 10px; background: #1a0a0a; border: 1px solid #7f1d1d; color: #f87171; }

  /* GEAR DB PAGE */
  .gear-db-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 80px); }
  .gear-db-sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 1rem; position: sticky; top: 50px; height: calc(100vh - 50px); overflow-y: auto; }
  .gear-type-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; text-align: left; transition: all 0.15s; margin-bottom: 2px; }
  .gear-type-btn:hover { background: var(--surface2); color: var(--text); }
  .gear-type-btn.active { background: var(--surface2); color: var(--accent); }
  .gear-type-btn .gear-icon { font-size: 16px; width: 20px; text-align: center; }
  .gear-main { padding: 1.25rem; }
  .gear-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .gear-search { margin-bottom: 1.25rem; }
  .gear-search input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .gear-search input::placeholder { color: var(--muted); }
  .gear-search input:focus { border-color: var(--accent); }

  /* MODEL CARDS */
  .model-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; }
  .model-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
  .model-card-img { width: 100%; height: 220px; background: var(--bg); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); overflow: hidden; }
  .model-card-img img { width: 92%; height: 198px; object-fit: contain; filter: drop-shadow(0 2px 12px rgba(0,0,0,0.7)); }
  .model-card-img .no-img { font-size: 48px; opacity: 0.08; }
  .model-card-body { padding: 0.9rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .model-card-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .model-card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .model-card-tag { font-size: 11px; padding: 2px 7px; border-radius: 8px; background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted); }
  .model-card-tag.copper { border-color: #166534; color: #4ade80; background: #0a1f10; }
  .model-card-tag.no-copper { border-color: #7f1d1d; color: #f87171; background: #1a0a0a; }
  .model-card-tag.upgradeable    { border-color: #a16207; color: #fde047; background: #1c1500; }
  .model-card-tag.indicator-warning  { border-color: #7f1d1d; color: #f87171; background: #1a0a0a; }
  .model-card-tag.indicator-subpar   { border-color: #92400e; color: #fb923c; background: #1c0f00; }
  .model-card-tag.indicator-positive { border-color: #166534; color: #4ade80; background: #0a1f10; }
  .model-card-tag.indicator-neutral  { border-color: #1e3a5f; color: #7dd3fc; background: #0a1520; }
  .model-card-tag.indicator-vintage  { border-color: #6b3fa0; color: #d8b4fe; background: #1a0a2e; }
  .model-card-variants { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .model-card-footer { font-size: 13px; color: var(--text); font-weight: 700; padding-top: 8px; margin-top: auto; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }

  /* GEAR VARIANT MODAL */
  .gear-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 960px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; animation: modalIn 0.2s ease; }
  .gear-modal-header { margin-bottom: 1.5rem; padding-right: 2.5rem; }
  .gear-modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 2px; }
  .gear-modal-manufacturer { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .gear-modal-type { font-size: 13px; color: #7a8fa6; font-weight: 500; margin-bottom: 10px; }
  .gear-modal-sub { font-size: 13px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .variants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .variant-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .variant-card-img { width: 100%; height: 198px; background: var(--bg); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
  .variant-card-img img { width: 90%; height: 180px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }
  .variant-card-img .no-img { font-size: 36px; opacity: 0.1; }
  .variant-card-body { padding: 0.85rem; flex: 1; }
  .variant-card-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 0.65rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .variant-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .variant-stat:last-of-type { border-bottom: none; }
  .variant-stat-label { color: var(--muted); }
  .variant-stat-val { font-weight: 500; color: var(--text); }
  .variant-card-footer { padding: 0.6rem 0.85rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; gap: 6px; flex-wrap: wrap; }
  .variant-cost { font-weight: 700; color: var(--text); font-size: 13px; word-break: break-word; }
  .variant-copper { font-size: 11px; padding: 2px 7px; border-radius: 8px; }
  .variant-copper.yes { border: 1px solid #166534; color: #4ade80; background: #0a1f10; }
  .variant-copper.no  { border: 1px solid #7f1d1d; color: #f87171; background: #1a0a0a; }
  .variant-features { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 0.85rem 0.7rem; }
  .variant-feature { font-size: 11px; padding: 2px 7px; border-radius: 8px; background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted); }

  /* COMPARE PAGE */
  .compare-page { padding: 1.5rem 2rem; display: flex; flex-direction: column; align-items: center; }
  .compare-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; align-self: flex-start; }
  .compare-tab { padding: 8px 24px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .compare-tab:hover { background: var(--surface2); color: var(--text); }
  .compare-tab.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
  .compare-panel { display: none; width: 100%; }
  .compare-panel.active { display: flex; justify-content: center; }
  .compare-table { border-collapse: collapse; table-layout: fixed; }
  .compare-table th { padding: 0; text-align: left; border-bottom: 2px solid var(--border); vertical-align: bottom; }
  .compare-table th.stat-header { width: 140px; padding: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); vertical-align: bottom; }
  .compare-table th.gear-col { width: 180px; padding: 0; }
  .compare-col-header { display: flex; flex-direction: column; align-items: center; padding: 12px 10px 10px; gap: 6px; position: relative; }
  .compare-col-img { width: 130px; height: 130px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .compare-col-img img { max-width: 116px; max-height: 116px; object-fit: contain; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7)); }
  .compare-col-img .no-img { font-size: 36px; opacity: 0.1; }
  .compare-col-add { width: 130px; height: 130px; background: var(--surface); border: 2px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.18s; font-size: 32px; color: var(--muted); }
  .compare-col-add:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .compare-col-name { font-size: 13px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.3; }
  .compare-col-brand { font-size: 11px; color: var(--muted); text-align: center; }
  .compare-col-remove { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; background: var(--border); border: none; border-radius: 4px; color: var(--muted); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .compare-col-remove:hover { background: var(--red); color: white; }
  .compare-table td { font-size: 13px; padding: 8px 12px; border-bottom: 1px solid var(--surface2); text-align: center; width: 180px; }
  .compare-table td.stat-label { color: var(--muted); font-size: 12px; text-align: left; padding-left: 12px; white-space: nowrap; width: 140px; border-right: 1px solid var(--border); }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: rgba(255,255,255,0.02); }
  .compare-table tr:hover td.better { background: rgba(74,222,128,0.12); }
  .compare-table tr:hover td.worse { background: rgba(248,113,113,0.1); }
  .compare-table td.better { color: var(--green); font-weight: 600; }
  .compare-table td.worse { color: var(--muted); font-weight: 600; }
  .compare-table td.equal { color: var(--text); }
  .compare-empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }

  /* PICKER MODAL */
  .picker-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 1.5rem; position: relative; animation: modalIn 0.2s ease; }
  .picker-search { margin-bottom: 1rem; }
  .picker-search input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text); outline: none; }
  .picker-search input:focus { border-color: var(--accent); }
  .picker-list { display: flex; flex-direction: column; gap: 6px; }
  .picker-item { padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .picker-item:hover { border-color: var(--accent); }
  .picker-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .picker-item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .layout, .gear-db-layout { grid-template-columns: 1fr; }
    .sidebar, .gear-db-sidebar { position: static; height: auto; }
    /* compare-sections removed */
    .slot-row { grid-template-columns: 1fr 1fr; }
  }
</style>

// ============================================================
// I18N
// ============================================================
let currentLang = 'en';
function t(key) { return translations[currentLang][key] || translations['en'][key] || key; }
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'" + lang + "'"));
  });
  applyTranslations();
  renderBuilds(); renderGearDB(); renderCompare();
}
function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-placeholder')));
}

// ============================================================
// PAGE NAVIGATION
// ============================================================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'geardb') renderGearDB();
  if (page === 'compare') renderCompare();
}

// ============================================================
// BUILDS PAGE
// ============================================================
let buildFilter = 'all', levelFilter = 'all-levels', selectedBuildId = null;

function updateCounts() {
  document.getElementById('count-all').textContent = builds.length;
  document.getElementById('count-spinning').textContent = builds.filter(b => b.type === 'spinning').length;
  document.getElementById('count-bottom').textContent = builds.filter(b => b.type === 'bottom').length;
  document.getElementById('count-float').textContent = builds.filter(b => b.type === 'float').length;
}

function setBuildFilter(filter, btn) {
  buildFilter = filter;
  document.querySelectorAll('#page-builds .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['spinning','bottom','float'].forEach(type => {
    const sub = document.getElementById('sub-' + type);
    if (sub) sub.style.display = (filter === type || filter.startsWith(type + '-')) ? 'flex' : 'none';
  });
  renderBuilds();
}

function setLevelFilter(level, btn) {
  levelFilter = level;
  document.querySelectorAll('#page-builds .sidebar-section:last-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBuilds();
}

function getFilteredBuilds() {
  const search = document.getElementById('buildSearch').value.toLowerCase();
  return builds.filter(b => {
    const typeMatch = buildFilter === 'all' || b.type === buildFilter || b.subtype === buildFilter ||
      (buildFilter === 'bottom-copper' && b.copperLegal && b.type === 'bottom');
    const lvlMatch = levelFilter === 'all-levels' ||
      (levelFilter === 'beginner' && b.minLevel < 20) ||
      (levelFilter === 'intermediate' && b.minLevel >= 20 && b.minLevel < 40) ||
      (levelFilter === 'advanced' && b.minLevel >= 40);
    const srch = !search || b.name.toLowerCase().includes(search) || b.rodName.toLowerCase().includes(search) ||
      b.reelName.toLowerCase().includes(search) || b.fish.some(f => f.toLowerCase().includes(search)) ||
      b.tags.some(tag => tag.toLowerCase().includes(search));
    return typeMatch && lvlMatch && srch;
  });
}

function renderBuilds() {
  const grid = document.getElementById('buildsGrid');
  const filtered = getFilteredBuilds();
  if (!filtered.length) { grid.innerHTML = `<div class="no-results">${t('no_results').replace('\n','<br>')}</div>`; return; }
  const sorted = [...filtered].sort((a, b) => a.cost - b.cost);
  grid.innerHTML = sorted.map(b => `
    <div class="build-card type-${b.type} ${selectedBuildId === b.id ? 'selected' : ''}" onclick="openBuildModal(${b.id})">
      <div class="card-top"><div class="card-name">${b.name}</div><div class="card-level">${b.levelLabel}</div></div>
      <div class="card-gear"><strong>${t('modal_rod')}:</strong> ${b.rodName} &nbsp;·&nbsp; <strong>${t('modal_reel')}:</strong> ${b.reelName}</div>
      <div class="card-tags">
        ${b.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        ${b.copperLegal ? '<span class="tag copper-yes">Copper ✓</span>' : '<span class="tag copper-no">Copper ✗</span>'}
        ${b.budget ? `<span class="tag budget">${t('tag_budget')}</span>` : ''}
        <span class="tag cost">~${b.cost.toLocaleString()} silver</span>
      </div>
    </div>
  `).join('');
}

function gearImg(imgSrc, emoji) {
  if (imgSrc) return `<div class="gear-card-img"><img src="${imgSrc}" alt="" onerror="this.parentElement.innerHTML='<span class=\'no-img\'>${emoji}</span>'"></div>`;
  return `<div class="gear-card-img"><span class="no-img">${emoji}</span></div>`;
}

        ${reel.saltwater !== undefined ? `<div class="gear-stat"><span class="gear-stat-label">${t('stat_saltwater')}</span><span class="gear-stat-val">${reel.saltwater ? '✔️' : '✖️'}</span></div>` : ''}

    </div>

function closeBuildModal(e) {

  renderBuilds();
}

// ============================================================
// GEAR DB PAGE
// ============================================================
let currentGearType = 'reels';
let currentReelTypeFilter = 'all';
let currentRodTypeFilter = 'all';

function setGearType(type, btn) {
  currentGearType = type;
  document.querySelectorAll('.gear-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // show reel/rod type filters based on current type
  const reelFilters = document.getElementById('reel-type-filters');
  const rodFilters = document.getElementById('rod-type-filters');
  if (reelFilters) reelFilters.style.display = type === 'reels' ? '' : 'none';
  if (rodFilters) rodFilters.style.display = type === 'rods' ? '' : 'none';
  // re-activate the All btn for the relevant panel
  const allReelBtn = document.querySelector('#reel-type-filters .gear-type-btn');
  if (allReelBtn && type === 'reels') { allReelBtn.classList.add('active'); currentReelTypeFilter = 'all'; }
  const allRodBtn = document.querySelector('#rod-type-filters .gear-type-btn');
  if (allRodBtn && type === 'rods') { allRodBtn.classList.add('active'); currentRodTypeFilter = 'all'; }
  renderGearDB();
}

function setReelTypeFilter(reelType, btn) {
  currentReelTypeFilter = reelType;
  document.querySelectorAll('#reel-type-filters .gear-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGearDB();
}

function setRodTypeFilter(rodType, btn) {
  currentRodTypeFilter = rodType;
  document.querySelectorAll('#rod-type-filters .gear-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGearDB();
}

function toggleRodGroup(grpId, btn, filterKey) {
  const grp = document.getElementById(grpId);
  const arrow = document.getElementById(grpId + '-arrow');
  const isOpen = grp.style.display !== 'none';
  // Close all groups first
  ['grp-spinning','grp-float','grp-bottom','grp-sea'].forEach(id => {
    const g = document.getElementById(id);
    const a = document.getElementById(id + '-arrow');
    if (g) g.style.display = 'none';
    if (a) { a.style.transform = ''; }
  });
  if (!isOpen) {
    grp.style.display = 'flex';
    if (arrow) arrow.style.transform = 'rotate(90deg)';
    // Also set the category filter
    setRodTypeFilter(filterKey, btn);
  } else {
    // Clicking open group again collapses and resets to All
    const allBtn = document.querySelector('#rod-type-filters .gear-type-btn');
    setRodTypeFilter('all', allBtn);
    document.querySelectorAll('#rod-type-filters .gear-type-btn').forEach(b => b.classList.remove('active'));
    if (allBtn) allBtn.classList.add('active');
  }
}

function renderGearDB() {
  const search = (document.getElementById('gearSearch')?.value || '').toLowerCase();
  const grid = document.getElementById('gearGrid');
  if (!grid) return;
  const dash = '—';
  const v = (val, suffix='') => (val !== undefined && val !== null && val !== '') ? val + suffix : dash;

  if (currentGearType === 'reels') {
    const typeOrder = ['spinning', 'Classic baitcasting', 'Conventional baitcasting', 'Low-Profile baitcasting'];
    const minCost = m => Math.min(...m.variants.map(v => v.cost || Infinity));
    const minGold = m => Math.min(...m.variants.map(v => v.costGold || Infinity));
    const isGoldOnly = m => m.variants.every(v => !v.cost);
    let models = reelModels.slice().sort((a, b) => {
      const typeA = typeOrder.indexOf(a.type), typeB = typeOrder.indexOf(b.type);
      if (typeA !== typeB) return typeA - typeB;
      const aGold = isGoldOnly(a), bGold = isGoldOnly(b);
      if (aGold && bGold) return minGold(a) - minGold(b);
      if (aGold) return 1;
      if (bGold) return -1;
      return minCost(a) - minCost(b);
    });
    if (currentReelTypeFilter !== 'all') models = models.filter(m => m.type === currentReelTypeFilter);
    if (search) models = models.filter(m => m.model.toLowerCase().includes(search) || m.variants.some(v => v.features?.some(f => f.toLowerCase().includes(search))));
    grid.innerHTML = models.map((m) => {
      const mi = reelModels.indexOf(m);
      const minLevel = Math.min(...m.variants.map(v => v.level));
      const sizesLabel = m.variants.map(v => v.size).join(', ');
      const dragRange = m.variants.length > 1
        ? [...new Set(m.variants.map(v => v.drag))].join('–') + ' kg'
        : m.variants[0].drag + ' kg';
      const anyCopperLegal = m.variants.some(v => v.copperLegal);
      const allCopperLegal = m.variants.every(v => v.copperLegal);
      const copperTag = allCopperLegal
        ? `<span class="model-card-tag copper">Copper ✓</span>`
        : anyCopperLegal
          ? `<span class="model-card-tag copper">Copper (some)</span>`
          : `<span class="model-card-tag no-copper">Copper ✗</span>`;
      const cardImg = m.image || m.variants.find(v => v.image)?.image || null;
      const img = cardImg
        ? `<img src="${cardImg}" alt="${m.model}" onerror="this.parentElement.innerHTML='<span class=\\'no-img\\'>⚙️</span>'">`
        : `<span class="no-img">⚙️</span>`;
      const minCostVariant = m.variants.reduce((a, b) => (a.cost||Infinity) < (b.cost||Infinity) ? a : b);
      const minCost = minCostVariant.cost;
      const minGold = minCostVariant.costGold;
      const prefix = m.variants.length > 1 ? 'from ' : '';
      const silverPart = minCost ? `${prefix}${minCost.toLocaleString()} silver` : null;
      const goldPart = minGold ? `<span style="color:#f0bc2e;font-weight:600;">${minGold} gold</span>` : null;
      const costStr = silverPart && goldPart ? `${silverPart} <span style="color:var(--muted);">/</span> ${goldPart}` : silverPart || (goldPart ?? '—');
      const anyUpgradeable = m.variants.some(v => v.dragUpgraded || v.ratioUpgraded || v.testUpgraded);
      const indicatorTags = (m.tags || []).map(tag => {
        const style = tag.type === 'warning' ? 'warning' : tag.type === 'subpar' ? 'subpar' : tag.type === 'positive' ? 'positive' : tag.type === 'vintage' ? 'vintage' : 'neutral';
        return `<span class="model-card-tag indicator-${style}">${tag.label}</span>`;
      }).join('');
      return `<div class="model-card" onclick="openGearModal('reels',${mi})">
        <div class="model-card-img">${img}</div>
        <div class="model-card-body">
          <div class="model-card-name">${m.displayName || m.model}</div>
          ${m.manufacturer ? `<div style="font-size:12px;color:var(--muted);margin-top:1px;">${m.manufacturer}</div>` : ''}
          <div style="font-size:12px;color:#7a8fa6;font-weight:500;margin-top:2px;margin-bottom:6px;">${{ "spinning": "Spinning", "Low-Profile baitcasting": "Low-Profile Baitcasting", "Classic baitcasting": "Classic Baitcasting", "Conventional baitcasting": "Conventional Baitcasting" }[m.type] || m.type}</div>
          <div class="model-card-meta">
            <span class="model-card-tag">Lvl ${minLevel}+</span>
            ${anyUpgradeable ? `<span class="model-card-tag upgradeable">Upgradeable</span>` : ''}
            ${indicatorTags}
          </div>
          <div class="model-card-variants">${m.variants.length} size${m.variants.length > 1 ? 's' : ''}: ${sizesLabel} · Drag ${dragRange}</div>
          <div class="model-card-footer">${costStr}</div>
        </div>
      </div>`;
    }).join('') || `<div class="no-results">No reels found.</div>`;

  } else if (currentGearType === 'rods') {
    let models = [...rodModels];
    // filter by rod type — category keys start with _ (e.g. _spinning filters all spinning subtypes)
    if (currentRodTypeFilter !== 'all') {
      const spinningTypes = ['spinning','casting','jerkbait'];
      const floatTypes = ['telescopic','bolognese','match'];
      const bottomTypes = ['carp','feeder','picker'];
      const seaTypes = ['pilker','deep sea'];
      if (currentRodTypeFilter === '_spinning') models = models.filter(m => spinningTypes.includes(m.type));
      else if (currentRodTypeFilter === '_float') models = models.filter(m => floatTypes.includes(m.type));
      else if (currentRodTypeFilter === '_bottom') models = models.filter(m => bottomTypes.includes(m.type));
      else if (currentRodTypeFilter === '_sea') models = models.filter(m => seaTypes.includes(m.type));
      else models = models.filter(m => m.type === currentRodTypeFilter);
    }
    if (search) models = models.filter(m => m.model.toLowerCase().includes(search) || m.subtype?.toLowerCase().includes(search));
    models = models.map(m => ({ ...m, variants: [...m.variants].sort((a,b) => (a.cost||0) - (b.cost||0)) }));
    models.sort((a,b) => (Math.min(...a.variants.map(v=>v.cost||0))) - (Math.min(...b.variants.map(v=>v.cost||0))));
    grid.innerHTML = models.map((m) => {
      const mi = rodModels.indexOf(m);
      const minLevel = Math.min(...m.variants.map(v => v.level));
      const anyCopperLegal = m.variants.some(v => v.copperLegal);
      const allCopperLegal = m.variants.every(v => v.copperLegal);
      const copperTag = allCopperLegal
        ? `<span class="model-card-tag copper">Copper ✓</span>`
        : anyCopperLegal
          ? `<span class="model-card-tag copper">Copper (some)</span>`
          : `<span class="model-card-tag no-copper">Copper ✗</span>`;
      const img = m.image
        ? `<img src="${m.image}" alt="${m.model}" onerror="this.parentElement.innerHTML='<span class=\\'no-img\\'>🎣</span>'">`
        : `<span class="no-img">🎣</span>`;
      const minCost = Math.min(...m.variants.map(v => v.cost || Infinity));
      const costStr = isFinite(minCost) ? (m.variants.length > 1 ? 'from ' : '') + minCost.toLocaleString() + ' silver' : '—';
      const action = [...new Set(m.variants.map(v => v.action))].join(' / ');
      const lengths = [...new Set(m.variants.map(v => v.length + 'm'))].join(', ');
      return `<div class="model-card" onclick="openGearModal('rods',${mi})">
        <div class="model-card-img">${img}</div>
        <div class="model-card-body">
          <div class="model-card-name">${m.model}</div>
          ${m.manufacturer ? `<div style="font-size:12px;color:var(--muted);margin-top:1px;">${m.manufacturer}</div>` : ''}
          <div style="font-size:12px;color:#7a8fa6;font-weight:500;margin-top:2px;margin-bottom:6px;">${({"spinning":"Spinning","casting":"Casting","jerkbait":"Jerkbait","telescopic":"Telescopic","bolognese":"Bolognese","match":"Match","carp":"Carp","feeder":"Feeder","picker":"Picker","pilker":"Pilker","deep sea":"Deep Sea / Trolling","deep sea":"Deep Sea / Trolling"}[m.type] || m.type)}</div>
          <div class="model-card-meta">
            <span class="model-card-tag">Lvl ${minLevel}+</span>
          </div>
          <div class="model-card-variants">${m.variants.length} variant${m.variants.length > 1 ? 's' : ''}: ${lengths} · ${action}</div>
          <div class="model-card-footer">${costStr}</div>
        </div>
      </div>`;
    }).join('') || `<div class="no-results">No rods found.</div>`;

  } else {
    let items = [...lines];
    if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
    items.sort((a, b) => (a.cost || 0) - (b.cost || 0));
    grid.innerHTML = items.map(l => `
      <div class="model-card" style="cursor:default;">
        <div class="model-card-img"><span class="no-img">〰️</span></div>
        <div class="model-card-body">
          <div class="model-card-name">${l.name}</div>
          <div class="model-card-meta">
            <span class="model-card-tag">${l.type}</span>
            <span class="model-card-tag">${l.diameter}mm</span>
          </div>
          <div class="model-card-variants">Breaking load: ${l.breakingLoad} kg${l.color ? ' · ' + l.color : ''}</div>
          <div class="model-card-footer">${l.cost ? l.cost.toLocaleString() + ' silver' : '—'}</div>
        </div>
      </div>
    `).join('') || `<div class="no-results">No lines found.</div>`;
  }
}

function openGearModal(type, modelIndex) {
  const m = type === 'reels' ? reelModels[modelIndex] : rodModels[modelIndex];
  const dash = '—';
  const v = (val, suffix='') => (val !== undefined && val !== null && val !== '') ? val + suffix : dash;

  let variantsHtml = '';
  if (type === 'reels') {
    variantsHtml = m.variants.map(variant => {
      const img = (variant.image || m.image)
        ? `<img src="${variant.image || m.image}" alt="Size ${variant.size}" onerror="this.parentElement.innerHTML='<span class=\\'no-img\\'>⚙️</span>'">`
        : `<span class="no-img">⚙️</span>`;
      const features = variant.features?.length
        ? `<div class="variant-features">${variant.features.map(f => `<span class="variant-feature">${f}</span>`).join('')}</div>`
        : '';
      return `<div class="variant-card">
        <div class="variant-card-img">${img}</div>
        <div class="variant-card-body">
          <div class="variant-card-title">${variant.label || 'Size ' + variant.size}</div>
          <div class="variant-stat"><span class="variant-stat-label">Max drag</span><span class="variant-stat-val">${variant.dragUpgraded ? `${variant.drag} kg → <span style="color:#4ade80;">${variant.dragUpgraded} kg ▲</span>` : v(variant.drag, ' kg')}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Mechanism</span><span class="variant-stat-val">${v(variant.mechanism, ' kg')}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Test</span><span class="variant-stat-val">${(() => { const t = getReelTest(m.type, variant.size, variant.test); const tu = variant.testUpgraded; return t !== null ? (tu ? `${t}g → <span style="color:#4ade80;">${tu}g ▲</span>` : t + 'g') : '—'; })()}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Line Cap Index</span><span class="variant-stat-val">${calcSVI(variant.lineDia, variant.lineLen) ?? '—'}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Gear ratio</span><span class="variant-stat-val">${variant.ratioUpgraded ? `${variant.ratio} → <span style="color:#4ade80;">${variant.ratioUpgraded} ▲</span>` : variant.ratioAlt ? `${variant.ratio} <span style="color:#7dd3fc;">↔ ${variant.ratioAlt}</span>` : v(variant.ratio)}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Level</span><span class="variant-stat-val">${v(variant.level)}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Saltwater</span><span class="variant-stat-val">${variant.saltwater ? '✔️' : '✖️'}</span></div>
        </div>
        <div class="variant-card-footer">
          ${m.type.includes('baitcasting') ? '' : `<span class="variant-copper ${variant.copperLegal ? 'yes' : 'no'}">${variant.copperLegal ? 'Copper ✓' : 'Copper ✗'}</span>`}
          <span class="variant-cost">${
            variant.cost && variant.costGold ? `${variant.cost.toLocaleString()} silver <span style="color:var(--muted);">/</span> <span style="color:#f0bc2e;font-weight:600;">${variant.costGold} gold</span>`
            : variant.cost ? variant.cost.toLocaleString() + ' silver'
            : variant.costGold ? `<span style="color:#f0bc2e;font-weight:600;">${variant.costGold} gold</span>`
            : '—'
          }</span>
        </div>
      </div>`;
    }).join('');
  } else {
    variantsHtml = m.variants.map(variant => {
      const img = (variant.image || m.image)
        ? `<img src="${variant.image || m.image}" alt="${variant.length}" onerror="this.parentElement.innerHTML='<span class=\\'no-img\\'>🎣</span>'">`
        : `<span class="no-img">🎣</span>`;
      return `<div class="variant-card">
        <div class="variant-card-img">${img}</div>
        <div class="variant-card-body">
          <div class="variant-card-title">${variant.length}</div>
          <div class="variant-stat"><span class="variant-stat-label">Load cap</span><span class="variant-stat-val">${v(variant.loadCap, ' kg')}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Test</span><span class="variant-stat-val">${variant.testMin !== undefined ? variant.testMin+'–'+variant.testMax+'g' : dash}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Action</span><span class="variant-stat-val">${v(variant.action)}</span></div>
          <div class="variant-stat"><span class="variant-stat-label">Stiffness</span><span class="variant-stat-val">${v(variant.stiffness)}</span></div>
          ${variant.sensitivity !== null && variant.sensitivity !== undefined ? `<div class="variant-stat"><span class="variant-stat-label">Sensitivity</span><span class="variant-stat-val">${variant.sensitivity}</span></div>` : ''}
          <div class="variant-stat"><span class="variant-stat-label">Power</span><span class="variant-stat-val">${v(variant.power)}</span></div>
          ${variant.bonus ? `<div class="variant-stat"><span class="variant-stat-label">Bonus</span><span class="variant-stat-val">${variant.bonus}</span></div>` : ''}
          <div class="variant-stat"><span class="variant-stat-label">Level</span><span class="variant-stat-val">${v(variant.level)}</span></div>
        </div>
        <div class="variant-card-footer">
          <span class="variant-copper ${variant.copperLegal ? 'yes' : 'no'}">${variant.copperLegal ? 'Copper ✓' : 'Copper ✗'}</span>
          <span class="variant-cost">${variant.cost ? variant.cost.toLocaleString() + ' silver' : '—'}</span>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('gearModalContent').innerHTML = `
    <button class="modal-close" onclick="closeGearModal()">✕</button>
    <div class="gear-modal-header">
      <div class="gear-modal-title">${m.displayName || m.model}</div>
      ${m.manufacturer ? `<div class="gear-modal-manufacturer">${m.manufacturer}</div>` : ''}
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;">
        <div class="gear-modal-type">${(type === 'reels' ? ({"spinning":"Spinning","Low-Profile baitcasting":"Low-Profile Baitcasting","Classic baitcasting":"Classic Baitcasting","Conventional baitcasting":"Conventional Baitcasting"}[m.type] || m.type) : ({"spinning":"Spinning","casting":"Casting","jerkbait":"Jerkbait","telescopic":"Telescopic","bolognese":"Bolognese","match":"Match","carp":"Carp","feeder":"Feeder","picker":"Picker","pilker":"Pilker","deep sea":"Deep Sea / Trolling"}[m.subtype||m.type] || m.subtype || m.type))}</div>
      </div>
      ${(m.tags||[]).length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">${(m.tags||[]).map(tag=>`<span class="model-card-tag indicator-${tag.type}" style="font-size:11px;">${tag.label}</span>`).join('')}</div>` : ''}
    </div>
    <div class="variants-grid">${variantsHtml}</div>
  `;
  document.getElementById('gearModalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGearModal(e) {
  if (e && e.target !== document.getElementById('gearModalOverlay')) return;
  document.getElementById('gearModalOverlay').classList.remove('open');
  document.body.style.overflow = '';

let compareSlots = { reels: [null, null, null, null], rods: [null, null, null, null] };
let pickerContext = { type: null, slot: null };

function renderCompare() {
  renderCompareTable('reels');
  renderCompareTable('rods');
}

function clearSlot(type, idx) {
  compareSlots[type][idx] = null;
  renderCompareTable(type);
}

function renderCompareTable(type) {
  const container = document.getElementById(`${type}-compare-table`);
  if (!container) return;
  const items = compareSlots[type]; // always 4 slots, some may be null
  const modelList = type === 'reels' ? reelModels : rodModels;

  const getManufacturer = (item) => {
    if (!item) return '';
    const model = modelList.find(m => m.variants.some(v => `${m.model} ${type === 'reels' ? v.size : v.length}` === item.name));
    return model?.manufacturer || '';
  };
  const getModelTags = (item) => {
    if (!item) return [];
    const model = modelList.find(m => m.variants.some(v => `${m.model} ${type === 'reels' ? v.size : v.length}` === item.name));
    return model?.tags || [];
  };

  // Build header columns - filled = image+name+brand+remove, empty = + button
  const headers = items.map((item, i) => {
    if (item) {
      const manufacturer = getManufacturer(item);
      const imgSrc = item.image;
      const imgHtml = imgSrc
        ? `<img src="${imgSrc}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span class=\\'no-img\\'>${type==='reels'?'⚙️':'🎣'}</span>'">`
        : `<span class="no-img">${type==='reels'?'⚙️':'🎣'}</span>`;
      return `<th class="gear-col">
        <div class="compare-col-header">
          <button class="compare-col-remove" onclick="clearSlot('${type}',${i})">×</button>
          <div class="compare-col-img">${imgHtml}</div>
          <div class="compare-col-name">${item.name}</div>
          <div class="compare-col-brand">${manufacturer}</div>
        </div>
      </th>`;
    } else {
      return `<th class="gear-col">
        <div class="compare-col-header">
          <div class="compare-col-add" onclick="openPicker('${type}',${i})">+</div>
        </div>
      </th>`;
    }
  }).join('');

  // Always render the full table — even if no slots are filled

  const stats = type === 'reels'
    ? [
      ['stat_size',      r => r.size,                   null],
      ['stat_drag',      r => r.dragUpgraded || r.drag, 'higher'],
      ['stat_mechanism', r => r.mechanism,              'higher'],
      ['stat_test',      r => r.test,                   'lower'],
      ['stat_spool_cap', r => r.svi ?? null,            'higher'],
      ['stat_ratio',     r => r.ratio,                  null],
      ['stat_level',     r => r.level,                  null],
      ['stat_saltwater', r => r.saltwater,              null],
      ['stat_cost',      r => r.cost ?? null,           'lower'],
    ]
    : [
      ['stat_load_cap',    r => r.loadCap,              'higher'],
      ['stat_test',        r => r.testMin !== undefined ? `${r.testMin}–${r.testMax}` : null, null],
      ['stat_bonus',       r => r.bonus || null,        null],
      ['stat_action',      r => r.action,               null],
      ['stat_stiffness',   r => r.stiffness,            null],
      ['stat_sensitivity', r => r.sensitivity ?? null,  null],
      ['stat_power',       r => r.power,                null],
      ['stat_level',       r => r.level,                null],
      ['stat_cost',        r => r.cost ?? null,         'lower'],
    ];

  const formatVal = (r, key) => {
    if (!r) return '';
    if (key === 'stat_drag') {
      const base = r.drag, up = r.dragUpgraded;
      return up ? `${base} kg → <span style="color:#4ade80;">${up} kg ▲</span>` : `${base} kg`;
    }
    if (key === 'stat_mechanism') return r.mechanism ? r.mechanism + ' kg' : '—';
    if (key === 'stat_test') return r.test !== null && r.test !== undefined ? r.test + 'g' : (r.testMin !== undefined ? `${r.testMin}–${r.testMax}g` : '—');
    if (key === 'stat_cost') {
      if (!r.cost && !r.costGold) return '—';
      const s = r.cost ? `<span style="color:var(--text);font-weight:700;">${r.cost.toLocaleString()} silver</span>` : null;
      const g = r.costGold ? `<span style="color:#f0bc2e;font-weight:600;">${r.costGold} gold</span>` : null;
      return s && g ? `${s} <span style="color:var(--muted);">/</span> ${g}` : s || g;
    }
    if (key === 'stat_load_cap') return r.loadCap ? r.loadCap + ' kg' : '—';
    if (key === 'stat_spool_cap') return r.svi !== null && r.svi !== undefined ? r.svi : '—';
    if (key === 'stat_saltwater') return r.saltwater ? '<span style="color:#4ade80;font-weight:700;">✓</span>' : '<span style="color:#f87171;font-weight:700;">✗</span>';
    const raw = stats.find(s => s[0] === key)?.[1](r);
    return raw ?? '—';
  };

  const rows = stats.map(([key, prop, higherBetter]) => {
    const vals = items.map(item => item ? prop(item) : null);
    const nums = vals.map(v => typeof v === 'number' ? v : null);
    const filledNums = nums.filter(n => n !== null);
    const classes = vals.map(() => '');
    const bgs = vals.map(() => '');
    if (filledNums.length > 1 && higherBetter) {
      const best = higherBetter === 'higher' ? Math.max(...filledNums) : Math.min(...filledNums);
      const allSame = filledNums.every(n => n === best);
      nums.forEach((n, i) => {
        if (n === null || allSame) return;
        if (n === best) { classes[i] = 'better'; bgs[i] = 'background:rgba(74,222,128,0.08);'; }
        else { classes[i] = 'worse'; bgs[i] = 'background:rgba(248,113,113,0.06);'; }
      });
    }
    const cells = items.map((item, i) => item
      ? `<td class="${classes[i]}" style="${bgs[i]}">${formatVal(item, key)}</td>`
      : `<td style="color:var(--muted);opacity:0.3;">—</td>`
    ).join('');
    return `<tr><td class="stat-label">${t(key)}</td>${cells}</tr>`;
  }).join('');

  // Durability row
  const tagCells = items.map(item => {
    if (!item) return `<td style="color:var(--muted);opacity:0.3;">—</td>`;
    const tags = getModelTags(item);
    if (!tags.length) return `<td style="color:var(--muted)">—</td>`;
    return `<td>${tags.map(tag => `<span class="model-card-tag indicator-${tag.type}" style="font-size:11px;">${tag.label}</span>`).join(' ')}</td>`;
  }).join('');
  const tagsRow = `<tr><td class="stat-label">Durability</td>${tagCells}</tr>`;

  container.innerHTML = `<table class="compare-table">
    <thead><tr><th class="stat-header"></th>${headers}</tr></thead>
    <tbody>${tagsRow}${rows}</tbody>
  </table>`;
}

function switchCompareTab(type, btn) {
  document.querySelectorAll('.compare-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.compare-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`compare-panel-${type}`).classList.add('active');
}
const DURABILITY_TIERS = {
  'low':    { type: 'warning',  label: 'Low durability' },
  'subpar': { type: 'warning',  label: 'Subpar durability', color: '#fb923c', bg: '#1c0f00', border: '#92400e' },
  'solid':  { type: 'positive', label: 'Solid durability' },
  'great':  { type: 'neutral',  label: 'Great durability', color: '#7dd3fc', bg: '#0a1520', border: '#1e3a5f' },
};

function openPicker(type, slot) {
  pickerContext = { type, slot };
  document.getElementById('pickerTitle').textContent = t(type === 'reels' ? 'gear_reels' : 'gear_rods');
  document.getElementById('pickerSearch').value = '';
  renderPickerList();
  document.getElementById('pickerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderPickerList() {
  const search = document.getElementById('pickerSearch').value.toLowerCase();
  const items = pickerContext.type === 'reels' ? reels : rods;
  const filtered = search ? items.filter(i => i.name.toLowerCase().includes(search)) : items;
  document.getElementById('pickerList').innerHTML = filtered.map(item => `
    <div class="picker-item" onclick="selectPickerItem('${item.name.replace(/'/g,"\\'")}')">
      <div class="picker-item-name">${item.name}</div>
      <div class="picker-item-sub">${pickerContext.type === 'reels' ? 'Size ' + item.size + ' · ' + item.ratio + ' · ' + item.drag + 'kg drag' : item.length + ' · ' + item.action + ' · ' + item.testMin + '–' + item.testMax + 'g'}</div>
    </div>
  `).join('');
}

function selectPickerItem(name) {
  const { type, slot } = pickerContext;
  const items = type === 'reels' ? reels : rods;
  compareSlots[type][slot] = items.find(i => i.name === name);
  closePicker();
  renderCompareTable(type);
}

function clearSlot(type, slot) {
  compareSlots[type][slot] = null;
  renderCompareTable(type);
}

function closePicker(e) {
  if (e && e.target !== document.getElementById('pickerOverlay')) return;
  document.getElementById('pickerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBuildModal(); closePicker(); closeGearModal(); }
});

// ============================================================
// INIT
// ============================================================
updateCounts();
renderBuilds();
applyTranslations();
</script>
</body>
</html>
